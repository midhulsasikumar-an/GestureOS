[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -ra --strict-markers --tb=short
markers =
    integration: integration tests (require pipeline wired through Activation)
    performance: performance tests (run nightly/pre-release, not on every commit)
filterwarnings =
    error
    ignore::DeprecationWarning:pkg_resources
    ignore::DeprecationWarning:google.protobuf
